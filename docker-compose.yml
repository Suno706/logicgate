services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Per-session saved circuits (each user gets a sub-folder)
      - circuits:/app/circuits
      # User query log + retrained intent classifier pickle persist across restarts
      - data:/app/data
      - models:/app/ml_models/saved
    environment:
      - PORT=5000
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # generous: model loading can take ~30s on first boot

volumes:
  circuits:
  data:
  models:
