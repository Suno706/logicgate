# Render.com deploy config — FREE TIER COMPATIBLE
#
# Render's free tier no longer supports persistent disks. That means SQLite
# data (users, circuits, query log) is wiped on every redeploy. Use this
# for demos / portfolio screenshots. For a real production site:
#   - Upgrade to Render Starter ($7/mo) and add a `disk:` block, OR
#   - Switch to Fly.io (see fly.toml) — free tier DOES support volumes
#
# Steps:
#   1. Push to GitHub
#   2. https://render.com → New → Blueprint → pick this repo
#   3. Click Apply
#   4. ~3 min later your URL is live: https://<service-name>.onrender.com

services:
  - type: web
    name: logicgate
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      # Optional Google sign-in: set these in the Render dashboard if wanted.
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false
