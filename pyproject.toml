[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = ["frontend", "data", "circuits", "ml_models/saved", "**/__pycache__"]

[tool.ruff.lint]
# Pragmatic rule set: gate on correctness signals only. The codebase predates
# ruff and a full reformat is out of scope.
select = [
    "E9",     # syntax errors
    "F63",    # invalid-print, comparison-with-itself, etc.
    "F7",     # syntax errors caught by pyflakes
    "F82",    # undefined name
    "PLE",    # pylint errors
]
